name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    # Skip the release commit's own push (loop prevention). head_commit is null
    # only for pushes that create no commit (e.g. tag pushes), which this job
    # ignores anyway; semantic-release is also idempotent against existing tags.
    if: ${{ github.event.head_commit && !contains(github.event.head_commit.message, '[skip ci]') }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      # uv is needed by the release's prepareCmd (`uv lock` keeps uv.lock in sync
      # with the bumped pyproject.toml version).
      - uses: astral-sh/setup-uv@v7

      - name: Install release tooling
        run: npm ci --no-audit --no-fund

      - name: Run semantic-release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
